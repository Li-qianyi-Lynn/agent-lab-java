<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Soc Ops — Social Bingo</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}"/>
    <style>
        /* Spring theme active-state tweaks */
        .tile-active:active { background-color: #f3f4f6 !important; }
        .accent-active:active { background-color: #db2777 !important; }
        
        /* Spring theme specific styles */
        .spring-header {
            background: linear-gradient(90deg, #fbcfe8 0%, #dcfce7 50%, #fef3c7 100%);
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.15);
        }
        
        .spring-button {
            background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
            transition: all 0.3s ease;
        }
        
        .spring-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.3);
        }
        
        .spring-button:active {
            transform: translateY(0px);
        }
    </style>
</head>
<body class="h-full">

<!-- ============================================================= -->
<!--  LOBBY — visible before a game starts                          -->
<!-- ============================================================= -->
<div id="lobbyView" class="flex flex-col items-center justify-center min-h-full p-6 bg-gradient-spring">
    <div class="animate-float text-center max-w-sm">
        <h1 class="text-5xl font-bold text-pink-700 mb-1 animate-spring-pulse">🌸 Soc Ops 🌸</h1>
        <p class="text-xl text-green-700 font-semibold mb-8">Social Bingo</p>

        <div class="bg-white rounded-2xl p-8 shadow-xl border-2 border-pastel-pink mb-8">
            <h2 class="font-bold text-xl text-pink-600 mb-4">How to play</h2>
            <ul class="text-left text-gray-700 text-sm space-y-3">
                <li class="flex items-start">
                    <span class="text-green-600 mr-2">🌿</span>
                    <span>Find people who match the questions</span>
                </li>
                <li class="flex items-start">
                    <span class="text-pink-600 mr-2">✨</span>
                    <span>Tap a square when you find a match</span>
                </li>
                <li class="flex items-start">
                    <span class="text-yellow-500 mr-2">⭐</span>
                    <span>Get 5 in a row to win!</span>
                </li>
            </ul>
        </div>

        <button onclick="launchGame()"
                class="w-full spring-button text-white font-bold py-4 px-8 rounded-2xl text-lg transition-all duration-300">
            🎮 Start Game
        </button>
    </div>
</div>

<!-- ============================================================= -->
<!--  ACTIVE GAME — board, header, optional bingo banner            -->
<!-- ============================================================= -->
<div id="activeView" class="flex flex-col min-h-full bg-gradient-spring" style="display:none">

    <!-- top bar -->
    <header class="spring-header flex items-center justify-between p-4">
        <button onclick="retreatToLobby()"
                class="text-pink-600 font-semibold text-sm px-3 py-2 rounded-full hover:bg-white transition-all tile-active">
            ← Back
        </button>
        <h1 class="font-bold text-2xl text-pink-700">🌸 Soc Ops</h1>
        <div class="w-16"></div>
    </header>

    <!-- hint -->
    <p class="text-center text-green-700 font-semibold text-sm py-3 px-4">
        ✨ Tap a square when you find someone who matches it
    </p>

    <!-- bingo banner (hidden until victory) -->
    <div id="bingoBanner"
         class="bg-gradient-to-r from-pink-300 to-yellow-200 text-pink-700 text-center py-3 font-bold text-base animate-spring-pulse"
         style="display:none">
        🎉 BINGO! You got a line! 🎉
    </div>

    <!-- the 5×5 grid -->
    <div class="flex-1 flex items-center justify-center p-4">
        <div id="gridContainer"
             class="grid grid-cols-5 gap-2 w-full max-w-md mx-auto aspect-square">
            <!-- tiles injected by JS -->
        </div>
    </div>
</div>

<!-- ============================================================= -->
<!--  VICTORY MODAL — overlays the board                            -->
<!-- ============================================================= -->
<div id="victoryOverlay"
     class="fixed inset-0 bg-black\/30 flex items-center justify-center p-4 z-50 backdrop-blur-sm"
     style="display:none">
    <div class="bg-white rounded-2xl p-8 max-w-xs w-full text-center shadow-2xl animate-[bounce_0.5s_ease-out] border-2 border-pink-300">
        <div class="text-6xl mb-4 animate-spring-pulse">🎉</div>
        <h2 class="text-4xl font-bold text-pink-600 mb-2">BINGO!</h2>
        <p class="text-green-700 font-semibold mb-6 text-lg">You completed a line! 🌸</p>
        <button onclick="dismissVictoryModal()"
                class="w-full spring-button text-white font-bold py-3 px-6 rounded-xl transition-all duration-300">
            ✨ Keep Playing
        </button>
    </div>
</div>

<!-- ============================================================= -->
<!--  Client-side game engine                                       -->
<!-- ============================================================= -->
<script>
(function () {
    "use strict";

    var SIDE = 5;
    var TOTAL_CELLS = SIDE * SIDE;
    var PERSIST_KEY = "socops-bingo-snapshot";

    /* ── state ────────────────────────────────────────────────── */
    var liveTiles   = [];          /* Array of BingoCell objects  */
    var streakFound = null;        /* WinningStreak or null       */
    var modalShown  = false;
    var currentPhase = "LOBBY";    /* LOBBY | ACTIVE | VICTORY    */

    /* ── DOM refs ─────────────────────────────────────────────── */
    var lobbyDiv   = document.getElementById("lobbyView");
    var activeDiv  = document.getElementById("activeView");
    var gridDiv    = document.getElementById("gridContainer");
    var bannerDiv  = document.getElementById("bingoBanner");
    var overlayDiv = document.getElementById("victoryOverlay");

    /* ── phase switching ──────────────────────────────────────── */
    function showPhase(phase) {
        currentPhase = phase;
        lobbyDiv.style.display   = (phase === "LOBBY") ? "" : "none";
        activeDiv.style.display  = (phase !== "LOBBY") ? "" : "none";
        bannerDiv.style.display  = (streakFound)       ? "" : "none";
        overlayDiv.style.display = (modalShown)        ? "" : "none";
    }

    /* ── board rendering ──────────────────────────────────────── */
    function paintGrid() {
        gridDiv.innerHTML = "";
        var winIds = streakFound ? gatherStreakIds(streakFound) : {};

        for (var t = 0; t < liveTiles.length; t++) {
            var tile = liveTiles[t];
            var btn = document.createElement("button");

            /* Spring theme styling with rounded corners and soft shadows */
            var base = "relative flex items-center justify-center p-2 text-center " +
                       "border-2 rounded-lg transition-all duration-150 " +
                       "select-none min-h-[70px] text-xs leading-tight font-semibold shadow-md hover:shadow-lg";

            var state;
            if (tile.selected) {
                state = winIds[tile.id]
                    ? "bg-victory border-pink-400 text-white"
                    : "bg-marked border-spring-green text-green-700";
            } else {
                state = "bg-white border-pink-200 text-gray-700 tile-active hover:bg-accent-light";
            }

            var extra = tile.freeCell ? " font-bold text-sm bg-gradient-to-br from-pink-100 to-green-100 border-pink-400" : "";
            btn.className = base + " " + state + extra;

            if (tile.freeCell) { btn.disabled = true; }
            btn.setAttribute("aria-pressed", String(tile.selected));
            btn.setAttribute("aria-label", tile.freeCell ? "Free space" : tile.prompt);

            /* inner label */
            var labelSpan = document.createElement("span");
            labelSpan.className = "wrap-break-word hyphens-auto";
            labelSpan.textContent = tile.prompt;
            btn.appendChild(labelSpan);

            /* check-mark for marked non-free tiles */
            if (tile.selected && !tile.freeCell) {
                var tick = document.createElement("span");
                tick.className = "absolute top-1 right-1 text-white text-sm font-bold";
                tick.textContent = "✓";
                btn.appendChild(tick);
            }

            /* click handler (closure over tile id) */
            btn.addEventListener("click", (function (cid) {
                return function () { onTileTapped(cid); };
            })(tile.id));

            gridDiv.appendChild(btn);
        }
    }

    /* ── tile tap logic ───────────────────────────────────────── */
    function onTileTapped(cellId) {
        liveTiles = flipTile(liveTiles, cellId);

        if (!streakFound) {
            var detected = scanForStreak(liveTiles);
            if (detected) {
                streakFound = detected;
                currentPhase = "VICTORY";
                modalShown = true;
            }
        }
        persistSnapshot();
        paintGrid();
        bannerDiv.style.display  = streakFound ? "" : "none";
        overlayDiv.style.display = modalShown  ? "" : "none";
    }

    /* ── board manipulation (mirrors BoardAssembler.java) ─────── */
    function flipTile(board, cellId) {
        return board.map(function (c) {
            if (c.id === cellId && !c.freeCell) {
                return { id: c.id, prompt: c.prompt, selected: !c.selected, freeCell: false };
            }
            return c;
        });
    }

    /* ── victory scanning (mirrors detectWinningStreak) ───────── */
    function scanForStreak(board) {
        var r, c, positions, i;

        /* rows */
        for (r = 0; r < SIDE; r++) {
            positions = [];
            for (c = 0; c < SIDE; c++) { positions.push(r * SIDE + c); }
            if (lineComplete(board, positions)) {
                return { direction: "row", index: r, cellPositions: positions };
            }
        }

        /* columns */
        for (c = 0; c < SIDE; c++) {
            positions = [];
            for (r = 0; r < SIDE; r++) { positions.push(r * SIDE + c); }
            if (lineComplete(board, positions)) {
                return { direction: "column", index: c, cellPositions: positions };
            }
        }

        /* main diagonal */
        positions = [];
        for (i = 0; i < SIDE; i++) { positions.push(i * SIDE + i); }
        if (lineComplete(board, positions)) {
            return { direction: "diagonal", index: 0, cellPositions: positions };
        }

        /* anti diagonal */
        positions = [];
        for (i = 0; i < SIDE; i++) { positions.push(i * SIDE + (SIDE - 1 - i)); }
        if (lineComplete(board, positions)) {
            return { direction: "diagonal", index: 1, cellPositions: positions };
        }

        return null;
    }

    function lineComplete(board, positions) {
        for (var k = 0; k < positions.length; k++) {
            if (!board[positions[k]].selected) { return false; }
        }
        return true;
    }

    function gatherStreakIds(streak) {
        var lookup = {};
        for (var j = 0; j < streak.cellPositions.length; j++) {
            lookup[streak.cellPositions[j]] = true;
        }
        return lookup;
    }

    /* ── localStorage persistence ─────────────────────────────── */
    function persistSnapshot() {
        try {
            var blob = JSON.stringify({
                phase: currentPhase,
                tiles: liveTiles,
                streak: streakFound,
                modal: modalShown
            });
            localStorage.setItem(PERSIST_KEY, blob);
        } catch (_) { /* storage full or unavailable */ }
    }

    function restoreSnapshot() {
        try {
            var raw = localStorage.getItem(PERSIST_KEY);
            if (!raw) { return false; }
            var snap = JSON.parse(raw);
            if (!snap.tiles || snap.tiles.length !== TOTAL_CELLS) { return false; }
            liveTiles   = snap.tiles;
            streakFound = snap.streak || null;
            modalShown  = !!snap.modal;
            currentPhase = snap.phase || "ACTIVE";
            return currentPhase !== "LOBBY";
        } catch (_) { return false; }
    }

    /* ── public API (called from onclick attrs) ───────────────── */
    window.launchGame = function () {
        fetch("/api/bingo/fresh-board")
            .then(function (resp) { return resp.json(); })
            .then(function (cells) {
                liveTiles   = cells;
                streakFound = null;
                modalShown  = false;
                currentPhase = "ACTIVE";
                persistSnapshot();
                paintGrid();
                showPhase("ACTIVE");
            });
    };

    window.retreatToLobby = function () {
        liveTiles   = [];
        streakFound = null;
        modalShown  = false;
        currentPhase = "LOBBY";
        persistSnapshot();
        showPhase("LOBBY");
    };

    window.dismissVictoryModal = function () {
        modalShown = false;
        overlayDiv.style.display = "none";
        persistSnapshot();
    };

    /* ── boot ─────────────────────────────────────────────────── */
    if (restoreSnapshot()) {
        paintGrid();
        showPhase(currentPhase);
    } else {
        showPhase("LOBBY");
    }
})();
</script>

</body>
</html>
